<script>
  window.search = {
    "docs": [
      {% for page in site.html_pages %}
        {% unless page.url contains '/search/' or page.url contains '/404.html' %}
          {% if page.url contains site.baseurl %}
            {% assign url = page.url | remove_first: site.baseurl %}
          {% else %}
            {% assign url = page.url %}
          {% endif %}
          {
            "id": "{{ forloop.index }}",
            "title": "{{ page.title | escape }}",
            "content": "{{ page.content | strip_html | strip_newlines | replace: '\', '\\\\' | replace: '"', '\"' | replace: '    ', ' ' | replace: '   ', ' ' | replace: '  ', ' ' | replace: '\n', ' ' | replace: '\r', ' ' }}",
            "url": "{{ url }}"
          }
          {% unless forloop.last %},{% endunless %}
        {% endunless %}
      {% endfor %}
    ]
  };
</script>

<script src="{{ site.baseurl }}/assets/js/lunr.stemmer.support.js"></script>
<script src="{{ site.baseurl }}/assets/js/lunr.multi.js"></script>
<script src="{{ site.baseurl }}/assets/js/lunr.hy.js"></script>

<script>
(function(lunr, search, hy, multiLanguage) {
  // Check that all necessary components are available
  if (lunr && search && hy && multiLanguage) {
    
    // Create the multilingual index immediately
    window.idx = lunr(function () {
      
      // CRITICAL STEP: Use both English ('en') and Armenian ('hy')
      this.use(lunr.multiLanguage('en', 'hy')); 
      
      this.ref('id');
      this.field('title', { boost: 20 });
      this.field('content', { boost: 10 });
      this.field('url');

      // Add data to the new index
      for (var key in search.docs) {
        this.add(search.docs[key]);
      }
    });

    console.log("SUCCESS: Lunr Multilingual Index is Active.");
  } else {
    console.error("FAILURE: Lunr components are missing or script execution order is wrong.");
  }
})(window.lunr, window.search, window.lunr ? window.lunr.hy : null, window.lunr ? window.lunr.multiLanguage : null);
</script>
